<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Sædereservation</title>
  <link rel="stylesheet" href="../css/seat-reservation.css">
</head>
<body>

<!-- header fragment -->
<div id="header-container"></div>

<main>
  <h1>Sædereservation</h1>

  <!-- hidden div, til at indtaste showing id manuelt, og som også sender værdien videre fra URL så den showings sæder bliver hentet-->
  <div class="form-box" hidden>
    <label for="showingId">Showing ID:</label>
    <input id="showingId" type="number">
    <button id="btnLoadSeats">Hent sæder</button>
  </div>

  <p id="statusText"></p>

  <div id="cinema">
    <div id="screen">BIOGRAF SKÆRM</div>
    <div id="seatGrid"></div>
  </div>

  <p>
    Valgte sæder:
    <span id="selectedSeatsText">Ingen</span>
  </p>

  <div class="form-box">
    <label for="phoneNr">Telefonnummer:</label>
    <input id="phoneNr" type="text">
    <button id="btnCreateReservation">Create Reservation</button>
  </div>

  <p id="resultMessage"></p>
</main>

<div id="confirmationPopup" class="overlay">
  <div class="popupboks">
    <h2>Reservation bekræftet</h2>

    <p><strong>Showing:</strong> <span id="popupShowing"></span></p>
    <p><strong>Telefonnummer:</strong> <span id="popupPhone"></span></p>
    <p><strong>Valgte sæder:</strong> <span id="popupSeats"></span></p>

    <div class="popup-footer">
      <button id="popupOkBtn">OK</button>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<!-- JS scripts -->
<script src="/js/fragments.js"></script>

<script src="../js/seat-reservation.js"></script>
</body>
</html>
