server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    #No reverse proxy, for testing docker build

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
