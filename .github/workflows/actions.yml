name: Push frontend to GHCR for compose

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Docker bygger og pusher image af frontend mappen til ghcr
  build-and-push-frontend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/teamcoolek/kino-frontend:latest
            ghcr.io/teamcoolek/kino-frontend:${{ github.sha }}